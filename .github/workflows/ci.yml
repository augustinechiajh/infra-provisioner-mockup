name: CI Pipeline

on:
  push:
    branches: [main] # Change to main once ready
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v

  terraform-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Validate S3 module
        run: |
          cd terraform/modules/s3
          terraform init -backend=false
          terraform validate

      - name: Validate EC2 module
        run: |
          cd terraform/modules/ec2
          terraform init -backend=false
          terraform validate
